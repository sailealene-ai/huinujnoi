<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploads Dashboard</title>

<style>
*{ box-sizing:border-box; margin:0; padding:0; font-family: sans-serif; }

body{ background:#f0f0f0; padding:20px; }

h1{ text-align:center; margin-bottom:30px; color:rgb(87,16,16); }

.cards{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }

.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  position:relative;
}

.card-header{ font-weight:bold; margin-bottom:10px; }

.status{
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:12px;
  border:1px solid black;
  background:#e6e6e6;
  color:#555;
  margin-bottom:10px;
}

.actions{ display:flex; gap:10px; margin-top:10px; }

button{
  padding:5px 10px;
  font-size:12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.remove-btn{ background:#f44336; color:white; }
.remove-btn:hover{ background:#d32f2f; }

.view-btn{ background:#2196f3; color:white; }
.view-btn:hover{ background:#1976d2; }

/* Overlay for preview */
.overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.overlay-content{
  position:relative;
  background:white;
  padding:20px;
  max-width:90%;
  max-height:90%;
  overflow:auto;
  border-radius:10px;
}

.overlay-content img, .overlay-content iframe{
  width:100%;
  height:80vh;
}

.close-overlay{
  position:absolute;
  top:10px; right:10px;
  background:#f44336; color:white;
  border:none; padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Uploaded Files Dashboard</h1>

<div class="cards" id="dashboard"></div>

<!-- Preview overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-content" id="overlay-content">
    <button class="close-overlay" id="close-overlay">Close</button>
  </div>
</div>

<script>
const dashboard = document.getElementById('dashboard');
const overlay = document.getElementById('overlay');
const overlayContent = document.getElementById('overlay-content');
const closeOverlay = document.getElementById('close-overlay');

function renderDashboard(){
  dashboard.innerHTML = '';
  const all = JSON.parse(localStorage.getItem('allUploads')) || [];

  all.forEach(file => {
    const card = document.createElement('div');
    card.classList.add('card');

    card.innerHTML = `
      <div class="card-header">${file.type.charAt(0).toUpperCase() + file.type.slice(1)}</div>
      <span class="status">${file.name}</span>
      <div class="actions">
        <button class="view-btn">👁 View</button>
        <button class="remove-btn">🗑 Remove</button>
      </div>
    `;

    // View button click
    card.querySelector('.view-btn').addEventListener('click', () => {
      showPreview(file);
    });

    // Remove button click
    card.querySelector('.remove-btn').addEventListener('click', () => {
      removeFile(file.type);
    });

    dashboard.appendChild(card);
  });
}

// Show overlay preview
function showPreview(file){
  overlayContent.innerHTML = `<button class="close-overlay" id="close-overlay">Close</button>`;

  const ext = file.name.split('.').pop().toLowerCase();
  let elem;

  if(ext === 'pdf'){
    elem = document.createElement('iframe');
    elem.src = URL.createObjectURL(new Blob([], {type:'application/pdf'})); 
    // NOTE: For real uploaded file preview, need actual file Blob. Using placeholder for demo.
  } else {
    elem = document.createElement('img');
    elem.src = `uploads/${file.name}`; // Adjust path to your storage if files are stored locally
    elem.alt = file.name;
  }

  overlayContent.appendChild(elem);
  overlay.style.display = 'flex';

  document.getElementById('close-overlay').addEventListener('click', () => {
    overlay.style.display = 'none';
    overlayContent.innerHTML = '';
  });
}

// Remove file
function removeFile(type){
  let all = JSON.parse(localStorage.getItem('allUploads')) || [];
  all = all.filter(f => f.type !== type);
  localStorage.setItem('allUploads', JSON.stringify(all));
  renderDashboard();
}

renderDashboard();
</script>

</body>
</html>
