<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

*{
box-sizing:border-box;
}

body{
margin:0;
}

header{
background:rgb(87,16,16);
padding:20px 30px;
display:flex;
flex-direction:column;
position:relative;
margin-bottom:40px;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
margin:0;
padding:0;
position:absolute;
bottom:20px;
right:20px;
}

nav a{
color:black;
font-weight:bold;
text-decoration:none;
padding:2px 13px;
border-radius:15px;
background-color:rgb(170,166,166);
border:1px solid black;
}

nav a:hover{
background-color:white;
}

.background{
background-image:url("images/mainbg.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
position:fixed;
height:100%;
width:100%;
filter:blur(13px);
z-index:-1;
}

.myportfolio{
border:2px solid black;
text-align:center;
width:500px;
margin:20px auto;
border-radius:20px;
background-color:rgb(170,166,166);
padding:20px;
font-size:30px;
}

footer{
background:rgb(87,16,16);
padding:45px 30px;
display:flex;
flex-direction:column;
align-items:center;
color:antiquewhite;
text-align:center;
margin-top:150px;
}

.container {
  padding: 40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
  text-align: center;
  color: black;
}

.subtitle {
  color: black;
  font-size: 14px;
  margin-bottom: 40px;
  text-align: center;
}

.stats {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.card {
  background-image:url("images/abtmebg.jpg");
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  
}

.chart-container {
  position: relative;
  height: 400px;
}

.stat-row {
  display: flex;
  justify-content: space-around;
  text-align: center;
}

.stat-item {
  flex: 1;
}

.number {
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 10px;
}

.label {
  font-size: 12px;
  text-transform: uppercase;
  color: gray;
  letter-spacing: 1px;
}

.filters {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 10px 20px;
  border: 1px solid black;
  border-radius: 20px;
  background: rgb(243, 227, 191);
  cursor: pointer;
  transition: 0.3s ease;
  font-size: 14px;
}

.filter-btn.active {
  background:rgb(170,166,166);
  color: black;
  border: black solid 1px;
}

.filter-btn:hover {
  background: rgb(87,16,16);
  color: white;
  transform: scale(1.09);
}

.uploads-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.upload-card {
  background-image: url("images/abtmebg.jpg");
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  overflow: hidden;
}

.card-header {
  background: rgb(165, 67, 67);
  padding: 20px;
  text-align: center;
  position: relative;
}

.card-icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgb(170,166,166);
  color: black;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  border: 1px solid black;
}

.card-body {
  padding: 20px;
}

.file-name {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
  word-break: break-word;
}

.file-info {
  font-size: 12px;
  color: gray;
  margin-bottom: 15px;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 15px;
}

.status-badge {
  background: #c8e6c9;
  color: #1b551e;
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
}

.delete-btn {
  background: none;
  border: none;
  color: gray;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s ease-in-out;
}

.delete-btn:hover {
  transform: scale(1.5);
}

.empty {
  text-align: center;
  padding: 30px 10px;
  border-radius: 30px;
  background-color: antiquewhite;
  color: rgb(87,16,16);
}

.empty a {
  color: rgb(87,16,16);
  text-decoration: none;
  font-weight: bold;
}

.empty a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

  <div class="background"> </div>

<header>
     <h1 class="myportfolio"> Dashboard Page </h1>
    <nav>    
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="uploads.html">Uploads</a></li>
</ul>

    </nav>
    </header>

<div class="container">
  <h1 style="color: rgb(87,16,16);">My Dashboard</h1>
  <p class="subtitle">The bar graph below shows my recent uploaded activity</p>

  <div class="stats">
    <div class="card">
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="stat-row">
        <div class="stat-item">
          <div class="number" id="total">0</div>
          <div class="label">Total Uploaded</div>
        </div>
        <div class="stat-item">
          <div class="number" id="quiz-count">0</div>
          <div class="label">Quizzes</div>
        </div>
        <div class="stat-item">
          <div class="number" id="lab-count">0</div>
          <div class="label">Lab Work</div>
        </div>
        <div class="stat-item">
          <div class="number" id="exam-count">0</div>
          <div class="label">Major Exams</div>
        </div>
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="quiz">Quizzes</button>
    <button class="filter-btn" data-filter="lab">Lab Work</button>
    <button class="filter-btn" data-filter="exam">Major Exams</button>
  </div>

  <div>
    <h2 style="font-size: 20px; color: rgb(87,16,16); margin-bottom: 20px;">All uploads</h2>
    <div class="uploads-grid" id="uploads"></div>
    
  </div>
</div>

<script>
const icons = { quiz: '📝', lab: '🧪', exam: '🎓' };
const labels = { quiz: 'QUIZ', lab: 'LAB WORK', exam: 'MAJOR EXAM' };

let files = [];
let filter = 'all';
let chart = null;

function load() {
  files = JSON.parse(localStorage.getItem('allUploads')) || [];
  updateStats();
  updateChart();
  render();
}

function updateStats() {
  const counts = { quiz: 0, lab: 0, exam: 0 };
  files.forEach(f => counts[f.type]++);
  
  document.getElementById('total').textContent = files.length;
  document.getElementById('quiz-count').textContent = counts.quiz;
  document.getElementById('lab-count').textContent = counts.lab;
  document.getElementById('exam-count').textContent = counts.exam;
}

function updateChart() {
  const counts = { quiz: 0, lab: 0, exam: 0 };
  files.forEach(f => counts[f.type]++);

  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Quizzes', 'Lab Work', 'Major Exams'],
      datasets: [{
        label: 'Uploads',
        data: [counts.quiz, counts.lab, counts.exam],
        backgroundColor: ['rgb(87,16,16)', 'rgb(129, 33, 33)', 'rgb(172, 68, 68)'],
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function render() {
  const container = document.getElementById('uploads');
  let show = files;
  
  if (filter !== 'all') {
    show = files.filter(f => f.type === filter);
  }

  show.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

  if (!show.length) {
    container.innerHTML = '<div class="empty" style="grid-column: 1/-1;"><p>No files yet</p><a href="uploads.html">Start uploading →</a></div>';
    return;
  }

  container.innerHTML = show.map(f => `
    <div class="upload-card">
      <div class="card-header">
        <div class="card-icon">${icons[f.type]}</div>
        <div class="badge">${labels[f.type]}</div>
      </div>
      <div class="card-body">
        <div class="file-name">${f.name}</div>
        <div class="file-info">
          ${new Date(f.uploadedAt).toLocaleDateString()} • ${f.name.split('.').pop().toUpperCase()}
        </div>
        <div class="footer">
          <span class="status-badge">${f.status}</span>
          <button class="delete-btn" onclick="deleteFile(${f.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function deleteFile(id) {
  if (confirm('Delete this file?')) {
    files = files.filter(f => f.id !== id);
    localStorage.setItem('allUploads', JSON.stringify(files));
    load();
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    filter = e.target.dataset.filter;
    render();
  });
});

window.addEventListener('load', load);
window.addEventListener('storage', load);
</script>

</body>
</html>
