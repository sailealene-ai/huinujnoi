<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Upload Page</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
}

header{
background:rgb(87,16,16);
padding:20px 30px;
display:flex;
flex-direction:column;
position:relative;
margin-bottom:40px;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
margin:0;
padding:0;
position:absolute;
bottom:20px;
right:20px;
}

nav a{
color:black;
font-weight:bold;
text-decoration:none;
padding:2px 13px;
border-radius:15px;
background-color:rgb(170,166,166);
border:1px solid black;
}

nav a:hover{
background-color:white;
}

.background{
background-image:url("../images/mainbg.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
position:fixed;
height:100%;
width:100%;
filter:blur(13px);
z-index:-1;
}

.myportfolio{
border:2px solid black;
text-align:center;
width:500px;
margin:20px auto;
border-radius:20px;
background-color:rgb(170,166,166);
padding:20px;
font-size:30px;
}

.container {
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  color: rgb(87,16,16);
  font-size: 14px;
  margin-bottom: 40px;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  align-items: center;
}

.card {
  background-image: url("../images/abtmebg.jpg");
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  text-align: center;
  max-width: 700px;
  width: 100%;
  border-radius: 2rem;
  padding: 2rem 1.5rem 2.5rem 1.5rem;
  box-shadow: 0 15px 30px #2a292c;
  margin: 0 auto;
  border: 1px white solid;

}

.card-header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
  text-align: center;
}

.card-header div {
  text-align: center;
}

.status {
  background: #e6e6e6;
  color: #555;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  border: black solid 1px;
}

.upload-box {
  border: 2px dashed #ccc;
  border-radius: 10px;
  padding: 30px 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s ease-in-out;
}

.upload-box:hover {
  border-color: #000;
  background: whitesmoke;
  transform: scale(1.02);
}

.upload-box.dragover {
  border-color: #000;
  background: #e8f4f8;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.upload-box p {
  font-size: 14px;
}

.upload-box span {
  color: gray;
  font-size: 12px;
}

.upload-box input {
  display: none;
}

.feedback {
  margin-top: 10px;
  font-size: 12px;
  min-height: 20px;
}

.feedback.success {
  color: #4CAF50;
}

.feedback.error {
  color: #f44336;
}

.remove-btn {
  margin-top: 10px;
  padding: 8px 15px;
  background: #f44336;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  display: none;
}

.remove-btn:hover {
  background: #d32f2f;
}

.remove-btn.show {
  display: inline-block;
}

footer{
background:rgb(87,16,16);
padding:45px 30px;
display:flex;
flex-direction:column;
align-items:center;
color:antiquewhite;
text-align:center;
margin-top:150px;
}

    
@media (max-width:768px){

header{
padding:15px;
margin-bottom:40px;
}

nav ul{
position:static;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}

.myportfolio{
width:90%;
font-size:22px;
}

footer{
margin-top:80px;
padding:30px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<header>

<h1 class="myportfolio">Quiz Upload Page</h1>

<nav>
<ul>
<li><a href="../index.html">Home</a></li>
<li><a href="../dashboard.html">Dashboard</a></li>
<li><a href="../uploads.html">Uploads</a></li>
</ul>
</nav>

</header>

<div class="container">
  <p class="subtitle">Upload your quiz files here</p>

  <div class="cards">
    <div class="card">
      <div class="card-header">
        <div>
          <strong>Quiz</strong><br>
          <span class="status" id="quiz-status">No file selected</span>
        </div>
      </div>
      <div class="upload-box" data-type="quiz">
        <input type="file" accept=".pdf,.jpg,.jpeg,.png">
        <p><strong>Click or drag</strong> your quiz file here</p>
        <span>PDF, Word, PowerPoint or Image</span>
        <div class="feedback" id="quiz-feedback"></div>
        <button class="remove-btn" id="quiz-remove">Remove File</button>
      </div>
    </div>
  </div>
</div>

<footer>
Facebook: Lealene Abrigo<br>
Instagram: @laleiszz
</footer>

<script>
const allowed = ['application/pdf','image/jpg','image/jpeg', 'image/png',];

const maxSize = 10 * 1024 * 1024;

document.querySelectorAll('.upload-box').forEach(box => {
  const type = box.dataset.type;
  const input = box.querySelector('input');
  const feedback = document.getElementById(`${type}-feedback`);
  const status = document.getElementById(`${type}-status`);
  const removeBtn = document.getElementById(`${type}-remove`);

  box.addEventListener('click', () => input.click());

  input.addEventListener('change', (e) => upload(e.target.files, type));

  box.addEventListener('dragover', (e) => {
    e.preventDefault();
    box.classList.add('dragover');
  });

  box.addEventListener('dragleave', () => box.classList.remove('dragover'));

  box.addEventListener('drop', (e) => {
    e.preventDefault();
    box.classList.remove('dragover');
    upload(e.dataTransfer.files, type);
  });

  removeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    clear(type);
  });

  loadFile(type);
});

function upload(files, type) {
  if (!files.length) return;

  const file = files[0];
  const feedback = document.getElementById(`${type}-feedback`);
  const status = document.getElementById(`${type}-status`);
  const removeBtn = document.getElementById(`${type}-remove`);

  if (!allowed.includes(file.type)) {
    feedback.textContent = '❌ Invalid file type';
    feedback.className = 'feedback error';
    return;
  }

  if (file.size > maxSize) {
    feedback.textContent = '❌ File too large (max 10MB)';
    feedback.className = 'feedback error';
    return;
  }

  feedback.textContent = `✓ ${file.name} uploaded`;
  feedback.className = 'feedback success';
  removeBtn.classList.add('show');
  status.textContent = 'Uploaded';
  status.style.background = '#c8e6c9';
  status.style.color = '#2e7d32';

  let all = JSON.parse(localStorage.getItem('allUploads')) || [];
  all.push({
    id: Date.now(),
    name: file.name,
    type,
    uploadedAt: new Date().toLocaleString(),
    status: 'SUBMITTED'
  });
  localStorage.setItem('allUploads', JSON.stringify(all));
}

function clear(type) {
  const feedback = document.getElementById(`${type}-feedback`);
  const status = document.getElementById(`${type}-status`);
  const removeBtn = document.getElementById(`${type}-remove`);
  const input = document.querySelector(`[data-type="${type}"] input`);

  let all = JSON.parse(localStorage.getItem('allUploads')) || [];
  all = all.filter(f => f.type !== type);
  localStorage.setItem('allUploads', JSON.stringify(all));

  feedback.textContent = '';
  feedback.className = 'feedback';
  removeBtn.classList.remove('show');
  status.textContent = 'No file selected';
  status.style.background = '#e6e6e6';
  status.style.color = '#555';
  input.value = '';
}

function loadFile(type) {
  let all = JSON.parse(localStorage.getItem('allUploads')) || [];
  let file = all.find(f => f.type === type);
  if (!file) return;

  const feedback = document.getElementById(`${type}-feedback`);
  const status = document.getElementById(`${type}-status`);
  const removeBtn = document.getElementById(`${type}-remove`);

  feedback.textContent = `✓ ${file.name} uploaded`;
  feedback.className = 'feedback success';
  removeBtn.classList.add('show');
  status.textContent = 'Uploaded';
  status.style.background = '#c8e6c9';
  status.style.color = '#2e7d32';
}
</script>


    
</body>
</html>
